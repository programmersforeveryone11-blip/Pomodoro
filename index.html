<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Keeper Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🍅</span>
            <span class="logo-text">FOCUS KEEPER</span>
        </div>
        <nav class="nav-links">
            <a href="#" class="active">Timer Option</a>
            <a href="#">Report</a>
        </nav>
        <button class="login-btn">Login</button>
    </header>

    <main class="main-container">
        <div class="timer-title">Focus Timer</div>
        
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>

        <div class="cycle-indicators">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="bottom-control-panel">
            <div class="cards-container">
                <div class="config-card active" id="focus-card">
                    <div class="card-label color-focus">Focus</div>
                    <div class="card-value-row">
                        <span class="card-icon">🔥</span>
                        <input type="number" id="focus-time" value="25" min="1" max="120">
                        <span class="card-unit">min</span>
                    </div>
                </div>
                
                <div class="config-card" id="short-break-card">
                    <div class="card-label color-short">Short Break</div>
                    <div class="card-value-row">
                        <span class="card-icon">☕</span>
                        <input type="number" id="short-time" value="5" min="1" max="30">
                        <span class="card-unit">min</span>
                    </div>
                </div>

                <div class="config-card" id="long-break-card">
                    <div class="card-label color-long">Long Break</div>
                    <div class="card-value-row">
                        <span class="card-icon">🌴</span>
                        <input type="number" id="long-time" value="25" min="1" max="60">
                        <span class="card-unit">min</span>
                    </div>
                </div>
            </div>

            <button id="action-btn" class="start-btn">START</button>
        </div>
    </main>

    <footer class="bottom-banner"></footer>

    <script src="script.js"></script>
</body>
</html>
