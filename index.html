<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Tomato Glitter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="decorations-layer">
        <div class="tomato t1"></div>
        <div class="tomato t2"></div>
        <div class="tomato t3"></div>
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
    </div>

    <div class="pomodoro-container">
        <div class="mode-buttons">
            <button id="work-btn" class="active">Trabajo</button>
            <button id="break-btn">Descanso</button>
        </div>
        
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        
        <div class="control-buttons">
            <button id="start-btn">Iniciar</button>
            <button id="pause-btn" style="display: none;">Pausar</button>
            <button id="reset-btn">Reiniciar</button>
        </div>
        
        <div class="status-text">
            <p id="status-message">¡Tiempo de concentrarse!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
